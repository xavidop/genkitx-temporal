# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    labels:
      - 'github-actions'
      - 'dependencies'
    schedule:
      interval: daily
  - package-ecosystem: 'npm'
    directory: '/'
    labels:
      - 'npm'
      - 'dependencies'
    schedule:
      interval: daily
  - package-ecosystem: 'npm'
    directory: '/examples/test-app'
    labels:
      - 'npm'
      - 'dependencies'
      - 'examples'
    schedule:
      interval: weekly
